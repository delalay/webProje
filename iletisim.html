  <h1 class="page-title">İletişim</h1>
  <div class="title-wrap">
    <hr class="short-hr">
  </div>

  <p class="about-text">
    Benimle iletişime geçmek için aşağıdaki formu kullanabilirsiniz.
    Formda yer alan tüm alanların doldurulması zorunludur.
  </p>

  <div class="row mt-4">
    <div class="col-md-7 mx-auto">
<div id="vueApp">
     <form action="iletisim.php" method="post" id="contactForm">

  <div class="mb-3">
    <label for="name" class="form-label">Ad Soyad</label>
    <input type="text" id="name" name="name" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="email" class="form-label">E‑posta</label>
    <input type="email" id="email" name="email" class="form-control" required>
  </div>

  <div class="mb-3">
    <label for="phone" class="form-label">Telefon</label>
    <input type="text" id="phone" name="phone" class="form-control" placeholder="Sadece rakam" required>
  </div>

  <div class="mb-3">
    <label for="subject" class="form-label">Konu</label>
    <select id="subject" name="subject" class="form-select" required>
      <option value="">Seçiniz</option>
      <option value="bilgi">Bilgi Talebi</option>
      <option value="oner">Öneri</option>
      <option value="sorun">Sorun Bildirimi</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">İletişim Tercihi</label><br>

    <input type="radio" id="mail" name="contact_type" value="E-posta" required>
    <label for="mail">E‑posta</label><br>

    <input type="radio" id="phone_contact" name="contact_type" value="Telefon">
    <label for="phone_contact">Telefon</label>
  </div>

  <div class="mb-3">
    <input type="checkbox" id="agreement" name="agreement" value="Onaylandı" required>
    <label for="agreement">Bilgilerimin kullanılmasını kabul ediyorum</label>
  </div>

  <div class="mb-3">
    <label for="message" class="form-label">Mesaj</label>
    <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
  </div>

  <button type="button" class="btn btn-warning w-100 mb-2" onclick="jsKontrol()">
  JavaScript ile Kontrol Et
</button>

<button type="button"
        class="btn btn-success w-100 mb-2"
        @click="vueKontrol">
  Vue.js ile Kontrol Et
</button>

  <button type="submit" class="btn btn-primary w-100">
    Gönder
  </button>

</form>
