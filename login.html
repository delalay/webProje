    <div class="col-md-5">

      <div class="card shadow-lg p-4">
        <h3 class="text-center mb-3">Giriş Yap</h3>

        <form action="login.php" method="post" onsubmit="return loginKontrol();">

          <div class="mb-3">
            <label class="form-label">Kullanıcı Adı (Öğrenci Maili)</label>
            <input type="email" id="username" name="username" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Şifre (Öğrenci No)</label>
            <input type="password" id="password" name="password" class="form-control">
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Giriş Yap
          </button>

        </form>

<script>
function loginKontrol() {
  const mail = document.getElementById("username").value;
  const sifre = document.getElementById("password").value;

  if (mail === "" || sifre === "") {
    alert("Boş alan bırakılamaz!");
    return false;
  }

  if (!mail.endsWith("@sakarya.edu.tr")) {
    alert("Geçerli bir öğrenci maili giriniz!");
    return false;
  }

  return true;
}
</script>
